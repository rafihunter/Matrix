<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alien Portal</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;overflow:hidden;width:100vw;height:100dvh;}
  #container{position:relative;width:100%;height:100dvh;}
  #video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  #fx{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  #hint{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-family:monospace;font-size:12px;letter-spacing:2px;text-align:center;white-space:nowrap;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:1;}}
  #loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#7c3aed;font-family:monospace;font-size:16px;letter-spacing:3px;text-align:center;z-index:20;}
  #loading p{font-size:11px;color:#6d28d9;margin-top:8px;}
</style>
</head>
<body>
<div id="container">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="fx"></canvas>
  <div id="hint">BRING BOTH PALMS CLOSE → PULL APART TO OPEN PORTAL</div>
  <div id="loading"><div>⬡ INITIALIZING</div><p>Loading hand tracking...</p></div>
</div>
<script type="module">
import { FilesetResolver, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304/+esm";

const video = document.getElementById('video');
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
const loading = document.getElementById('loading');
const hint = document.getElementById('hint');

let handLandmarker = null;
let W, H;
let portal = null;
let aliens = [];
let particles = [];
let energyArcs = [];
let frame = 0;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ---- PORTAL ----
class Portal {
  constructor(cx, cy, r){
    this.cx = cx; this.cy = cy;
    this.r = r; this.targetR = r;
    this.open = 0; this.rot = 0;
    this.innerRot = 0;
    this.alive = true;
    this.closing = false;
    this.distortion = 0;
    this.shockwave = 0;
    this.birth = frame;
  }

  update(cx, cy, r){
    this.cx += (cx - this.cx) * 0.18;
    this.cy += (cy - this.cy) * 0.18;
    this.targetR = r;
    this.r += (this.targetR - this.r) * 0.12;
    if(!this.closing) this.open = Math.min(1, this.open + 0.04);
    else this.open = Math.max(0, this.open - 0.06);
    this.rot += 0.008;
    this.innerRot += 0.025;
    this.distortion = Math.sin(frame * 0.05) * 0.08;
    if(this.shockwave > 0) this.shockwave -= 0.02;
  }

  draw(){
    if(this.open <= 0) return;
    const {cx, cy, r, open} = this;
    const scaledR = r * open;
    if(scaledR < 5) return;

    ctx.save();
    ctx.translate(cx, cy);

    // Outer shockwave rings
    for(let i = 3; i >= 0; i--){
      const pulse = (Math.sin(frame * 0.06 + i * 0.8) * 0.5 + 0.5);
      const rr = scaledR * (1.1 + i * 0.18 + pulse * 0.1);
      const alpha = (0.15 - i * 0.03) * open * pulse;
      ctx.beginPath();
      ctx.ellipse(0, 0, rr, rr * 0.55, 0, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(120,60,255,${alpha})`;
      ctx.lineWidth = 2 - i * 0.3;
      ctx.stroke();
    }

    // Deep space inside — clip to ellipse
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(0, 0, scaledR, scaledR * 0.55, 0, 0, Math.PI*2);
    ctx.clip();

    // Deep void background
    const bg = ctx.createRadialGradient(0, 0, 0, 0, 0, scaledR);
    bg.addColorStop(0, '#0a0015');
    bg.addColorStop(0.4, '#050008');
    bg.addColorStop(1, '#000003');
    ctx.fillStyle = bg;
    ctx.fillRect(-scaledR, -scaledR*0.6, scaledR*2, scaledR*1.2);

    // Nebula swirls inside
    ctx.save();
    ctx.rotate(this.innerRot);
    for(let i = 0; i < 6; i++){
      const a = (i/6)*Math.PI*2;
      const x = Math.cos(a) * scaledR * 0.35;
      const y = Math.sin(a) * scaledR * 0.2;
      const grad = ctx.createRadialGradient(x, y, 0, x, y, scaledR * 0.4);
      const hue = 260 + i * 20;
      grad.addColorStop(0, `hsla(${hue},100%,60%,0.12)`);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(-scaledR, -scaledR*0.6, scaledR*2, scaledR*1.2);
    }
    ctx.restore();

    // Star field inside
    for(let s = 0; s < 40; s++){
      const sx = Math.cos(s * 2.4 + this.innerRot * 0.3) * scaledR * (0.1 + (s%5)*0.15);
      const sy = Math.sin(s * 1.7 + this.innerRot * 0.2) * scaledR * 0.5 * (0.1 + (s%4)*0.2);
      const brightness = (Math.sin(frame*0.07 + s) * 0.5 + 0.5);
      ctx.beginPath();
      ctx.arc(sx, sy, 1 + brightness, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,180,255,${0.3 + brightness*0.5})`;
      ctx.fill();
    }

    // Energy vortex lines
    ctx.save();
    ctx.rotate(this.rot * 2);
    for(let v = 0; v < 8; v++){
      ctx.beginPath();
      for(let t = 0; t < Math.PI * 6; t += 0.04){
        const frac = t / (Math.PI * 6);
        const vr = frac * scaledR * 0.95;
        const va = t + v * Math.PI / 4;
        const vx = Math.cos(va) * vr;
        const vy = Math.sin(va) * vr * 0.55;
        t === 0 ? ctx.moveTo(vx, vy) : ctx.lineTo(vx, vy);
      }
      const hue = 270 + v * 15;
      ctx.strokeStyle = `hsla(${hue},100%,70%,0.08)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    ctx.restore();

    ctx.restore(); // unclip

    // Portal rim — thick glowing edge
    const rimGrad = ctx.createLinearGradient(-scaledR, 0, scaledR, 0);
    rimGrad.addColorStop(0,   'rgba(80,20,200,0.9)');
    rimGrad.addColorStop(0.3, 'rgba(160,60,255,1)');
    rimGrad.addColorStop(0.5, 'rgba(220,120,255,1)');
    rimGrad.addColorStop(0.7, 'rgba(160,60,255,1)');
    rimGrad.addColorStop(1,   'rgba(80,20,200,0.9)');

    // Multiple rim layers for glow depth
    for(let g = 5; g >= 0; g--){
      const expand = 1 + g * 0.04;
      const alpha = (0.15 - g*0.02) * open;
      ctx.beginPath();
      ctx.ellipse(0, 0, scaledR*expand, scaledR*0.55*expand, 0, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(140,60,255,${alpha})`;
      ctx.lineWidth = 8 + g * 6;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.ellipse(0, 0, scaledR, scaledR*0.55, 0, 0, Math.PI*2);
    ctx.strokeStyle = rimGrad;
    ctx.lineWidth = 4;
    ctx.stroke();

    // Bright inner rim
    ctx.beginPath();
    ctx.ellipse(0, 0, scaledR*0.98, scaledR*0.55*0.98, 0, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(220,180,255,${0.6*open})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Rotating energy rings
    for(let ring = 0; ring < 4; ring++){
      const rAngle = this.rot * (ring%2===0?1:-1) * (1+ring*0.3);
      const rSize = scaledR * (0.85 + ring*0.06);
      ctx.save();
      ctx.rotate(rAngle);
      ctx.beginPath();
      ctx.ellipse(0, 0, rSize, rSize*0.55, 0, 0, Math.PI*2);
      ctx.setLineDash([rSize*0.2, rSize*0.1]);
      ctx.strokeStyle = `rgba(160,80,255,${(0.3-ring*0.05)*open})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    // Lightning arcs on rim
    for(let arc = 0; arc < 6; arc++){
      if(Math.random() > 0.3) continue;
      const a1 = Math.random() * Math.PI * 2;
      const a2 = a1 + (Math.random()-0.5)*0.8;
      const x1 = Math.cos(a1)*scaledR, y1 = Math.sin(a1)*scaledR*0.55;
      const x2 = Math.cos(a2)*scaledR*0.6, y2 = Math.sin(a2)*scaledR*0.55*0.6;
      drawLightning(ctx, x1, y1, x2, y2, `rgba(200,150,255,0.6)`, 3);
    }

    // Gravitational lensing distortion effect (fake — dark halos)
    const lens = ctx.createRadialGradient(0, 0, scaledR*0.9, 0, 0, scaledR*1.3);
    lens.addColorStop(0, 'rgba(0,0,0,0)');
    lens.addColorStop(0.5, 'rgba(0,0,0,0.15)');
    lens.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.ellipse(0, 0, scaledR*1.3, scaledR*0.55*1.3, 0, 0, Math.PI*2);
    ctx.fillStyle = lens;
    ctx.fill();

    ctx.restore();
  }
}

function drawLightning(ctx, x1, y1, x2, y2, color, segs){
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  let cx = x1, cy = y1;
  for(let i = 0; i < segs; i++){
    const t = (i+1)/segs;
    const tx = x1 + (x2-x1)*t + (Math.random()-0.5)*20;
    const ty = y1 + (y2-y1)*t + (Math.random()-0.5)*10;
    ctx.lineTo(tx, ty);
    cx = tx; cy = ty;
  }
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

// ---- ALIEN ----
const ALIEN_TYPES = [
  { name:'tentacle', color:'#2a9d8f', eyeColor:'#e9c46a', size:1.0 },
  { name:'spider',   color:'#6a0572', eyeColor:'#ff0000', size:0.8 },
  { name:'blob',     color:'#1a472a', eyeColor:'#00ff88', size:1.2 },
];

class Alien {
  constructor(portalCx, portalCy, portalR){
    this.type = ALIEN_TYPES[Math.floor(Math.random()*ALIEN_TYPES.length)];
    this.x = portalCx + (Math.random()-0.5)*portalR*0.4;
    this.y = portalCy;
    this.size = (30 + Math.random()*40) * this.type.size;
    this.emerging = 0; // 0→1
    this.speed = 0.008 + Math.random()*0.006;
    this.alive = true;
    this.vy = 0.5 + Math.random()*1;
    this.vx = (Math.random()-0.5)*1.5;
    this.rot = Math.random()*Math.PI*2;
    this.rotSpeed = (Math.random()-0.5)*0.04;
    this.limbPhase = Math.random()*Math.PI*2;
    this.eyeBlink = 0;
    this.blinkTimer = Math.random()*120;
    this.fullyOut = false;
    this.fadeOut = 1;
    this.portalCx = portalCx;
    this.portalCy = portalCy;
    this.portalR = portalR;
    this.glowPulse = Math.random()*Math.PI*2;
  }

  update(){
    this.emerging = Math.min(1, this.emerging + this.speed);
    this.limbPhase += 0.08;
    this.glowPulse += 0.05;
    this.blinkTimer--;
    if(this.blinkTimer <= 0){ this.eyeBlink = 8; this.blinkTimer = 80+Math.random()*100; }
    if(this.eyeBlink > 0) this.eyeBlink--;
    this.rot += this.rotSpeed;

    if(this.emerging > 0.7){
      this.fullyOut = true;
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.08; // gravity
    }

    if(this.y > H + 200) this.alive = false;
  }

  draw(){
    const progress = this.emerging;
    if(progress <= 0) return;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);

    // Emergence glow
    if(progress < 0.9){
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size*1.5);
      glow.addColorStop(0, `${this.type.color}44`);
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, this.size*1.5, 0, Math.PI*2);
      ctx.fill();
    }

    const s = this.size * Math.min(1, progress * 2);

    if(this.type.name === 'tentacle') this.drawTentacleAlien(s, progress);
    else if(this.type.name === 'spider') this.drawSpiderAlien(s, progress);
    else this.drawBlobAlien(s, progress);

    ctx.restore();
  }

  drawTentacleAlien(s, prog){
    // Body
    const bodyGrad = ctx.createRadialGradient(0, -s*0.1, 0, 0, 0, s*0.7);
    bodyGrad.addColorStop(0, '#3dbfa8');
    bodyGrad.addColorStop(1, '#0d5c52');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(0, 0, s*0.5, s*0.65, 0, 0, Math.PI*2);
    ctx.fill();

    // Skin texture lines
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    for(let i = -3; i <= 3; i++){
      ctx.beginPath();
      ctx.arc(i*s*0.08, 0, s*0.4, 0.3, Math.PI-0.3);
      ctx.stroke();
    }

    // Tentacles
    const numT = 6;
    for(let t = 0; t < numT; t++){
      const angle = (t/numT)*Math.PI*2 + this.limbPhase*0.3;
      const wave = Math.sin(this.limbPhase + t*1.1);
      ctx.beginPath();
      const tx = Math.cos(angle)*s*0.4;
      const ty = Math.sin(angle)*s*0.4;
      const cx1 = tx + Math.cos(angle+1.5)*s*0.4 + wave*s*0.15;
      const cy1 = ty + Math.sin(angle+1.5)*s*0.4;
      const ex = tx + Math.cos(angle)*s*0.8 + wave*s*0.2;
      const ey = ty + Math.sin(angle)*s*0.8;
      ctx.moveTo(tx, ty);
      ctx.quadraticCurveTo(cx1, cy1, ex, ey);
      ctx.strokeStyle = '#1a7a6e';
      ctx.lineWidth = s*0.06 * (1 - t*0.05);
      ctx.stroke();
      // Sucker tips
      ctx.beginPath();
      ctx.arc(ex, ey, s*0.05, 0, Math.PI*2);
      ctx.fillStyle = '#0d5c52';
      ctx.fill();
    }

    // Eyes
    const eyeOpen = this.eyeBlink > 0 ? Math.max(0, 1 - this.eyeBlink/4) : 1;
    for(let e = -1; e <= 1; e+=2){
      ctx.save();
      ctx.translate(e*s*0.18, -s*0.2);
      // Eye socket
      ctx.beginPath();
      ctx.ellipse(0, 0, s*0.12, s*0.15*eyeOpen, 0, 0, Math.PI*2);
      ctx.fillStyle = '#000';
      ctx.fill();
      // Pupil glow
      const eyeGlow = ctx.createRadialGradient(0,0,0,0,0,s*0.08);
      eyeGlow.addColorStop(0, this.type.eyeColor);
      eyeGlow.addColorStop(0.5, '#aa8800');
      eyeGlow.addColorStop(1, '#440000');
      ctx.fillStyle = eyeGlow;
      ctx.beginPath();
      ctx.ellipse(0,0,s*0.08,s*0.1*eyeOpen,0,0,Math.PI*2);
      ctx.fill();
      // Eye shine
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath();
      ctx.arc(-s*0.03,-s*0.04,s*0.025,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    // Mouth
    ctx.beginPath();
    ctx.arc(0, s*0.25, s*0.2, 0.2, Math.PI-0.2);
    ctx.strokeStyle = '#0a4a42';
    ctx.lineWidth = s*0.04;
    ctx.stroke();
    // Teeth
    for(let tooth = -2; tooth <= 2; tooth++){
      ctx.beginPath();
      ctx.moveTo(tooth*s*0.07, s*0.33);
      ctx.lineTo(tooth*s*0.07 + s*0.02, s*0.43);
      ctx.lineTo(tooth*s*0.07 - s*0.02, s*0.43);
      ctx.closePath();
      ctx.fillStyle = '#ddd';
      ctx.fill();
    }
  }

  drawSpiderAlien(s, prog){
    // Legs
    const numLegs = 8;
    for(let l = 0; l < numLegs; l++){
      const side = l < 4 ? -1 : 1;
      const pos = (l % 4) / 3;
      const baseY = (pos - 0.5) * s * 0.8;
      const wave = Math.sin(this.limbPhase + l * 0.8) * s * 0.15;
      ctx.beginPath();
      ctx.moveTo(side * s * 0.2, baseY);
      ctx.quadraticCurveTo(
        side * s * 0.6 + wave, baseY + s*0.1,
        side * s * 0.9 + wave, baseY + s*0.3 + wave
      );
      ctx.strokeStyle = '#4a0050';
      ctx.lineWidth = s*0.04;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    // Abdomen
    ctx.beginPath();
    ctx.ellipse(0, s*0.35, s*0.25, s*0.35, 0, 0, Math.PI*2);
    const abdGrad = ctx.createRadialGradient(0,s*0.35,0,0,s*0.35,s*0.35);
    abdGrad.addColorStop(0,'#9b1cb0');
    abdGrad.addColorStop(1,'#3a0050');
    ctx.fillStyle = abdGrad;
    ctx.fill();
    // Abdomen pattern
    ctx.strokeStyle = 'rgba(255,50,255,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(0,s*0.35,s*0.1,s*0.15,0,0,Math.PI*2);
    ctx.stroke();

    // Cephalothorax
    ctx.beginPath();
    ctx.ellipse(0, -s*0.1, s*0.3, s*0.3, 0, 0, Math.PI*2);
    const headGrad = ctx.createRadialGradient(0,-s*0.1,0,0,-s*0.1,s*0.3);
    headGrad.addColorStop(0,'#8b15a0');
    headGrad.addColorStop(1,'#4a0055');
    ctx.fillStyle = headGrad;
    ctx.fill();

    // 8 eyes
    const eyeOpen = this.eyeBlink > 0 ? 0.2 : 1;
    const eyePositions = [
      [-0.15,-0.22],[0.15,-0.22],[-0.1,-0.08],[0.1,-0.08],
      [-0.2,-0.1],[0.2,-0.1],[-0.05,-0.3],[0.05,-0.3]
    ];
    eyePositions.forEach(([ex,ey])=>{
      ctx.beginPath();
      ctx.ellipse(ex*s, (ey-0.1)*s, s*0.05, s*0.05*eyeOpen, 0, 0, Math.PI*2);
      ctx.fillStyle = '#000';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex*s, (ey-0.1)*s, s*0.03, 0, Math.PI*2);
      ctx.fillStyle = this.type.eyeColor;
      ctx.fill();
    });

    // Fangs
    for(let f = -1; f <= 1; f+=2){
      ctx.beginPath();
      ctx.moveTo(f*s*0.08, s*0.15);
      ctx.lineTo(f*s*0.12, s*0.32);
      ctx.strokeStyle = '#cc00cc';
      ctx.lineWidth = s*0.04;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(f*s*0.12, s*0.33, s*0.03, 0, Math.PI*2);
      ctx.fillStyle = '#ff00ff';
      ctx.fill();
    }
  }

  drawBlobAlien(s, prog){
    // Blobby body with noise-based shape
    ctx.save();
    const glowPulse = Math.sin(this.glowPulse)*0.5+0.5;
    // Outer glow
    const blobGlow = ctx.createRadialGradient(0,0,0,0,0,s*0.9);
    blobGlow.addColorStop(0,`rgba(0,255,100,${0.1+glowPulse*0.1})`);
    blobGlow.addColorStop(1,'transparent');
    ctx.fillStyle = blobGlow;
    ctx.beginPath();
    ctx.arc(0,0,s*0.9,0,Math.PI*2);
    ctx.fill();

    // Body
    ctx.beginPath();
    const pts = 12;
    for(let i = 0; i <= pts; i++){
      const a = (i/pts)*Math.PI*2;
      const noise = 0.85 + Math.sin(a*3+this.limbPhase)*0.1 + Math.sin(a*5+this.limbPhase*0.7)*0.05;
      const bx = Math.cos(a)*s*0.6*noise;
      const by = Math.sin(a)*s*0.6*noise;
      i===0 ? ctx.moveTo(bx,by) : ctx.lineTo(bx,by);
    }
    ctx.closePath();
    const bGrad = ctx.createRadialGradient(0,0,0,0,0,s*0.6);
    bGrad.addColorStop(0,'#2eff7a');
    bGrad.addColorStop(0.5,'#0a8a3a');
    bGrad.addColorStop(1,'#062a15');
    ctx.fillStyle = bGrad;
    ctx.fill();

    // Translucent overlay (slime effect)
    ctx.beginPath();
    ctx.ellipse(0,-s*0.1,s*0.4,s*0.5,0,0,Math.PI*2);
    ctx.fillStyle = 'rgba(100,255,160,0.12)';
    ctx.fill();

    // Internal organs visible through translucent body
    for(let o = 0; o < 4; o++){
      const ox = Math.sin(o*1.5+this.limbPhase*0.2)*s*0.2;
      const oy = Math.cos(o*2.1)*s*0.2;
      ctx.beginPath();
      ctx.ellipse(ox,oy,s*0.08,s*0.06,o,0,Math.PI*2);
      ctx.fillStyle = `rgba(0,200,80,${0.15+Math.sin(this.limbPhase+o)*0.05})`;
      ctx.fill();
    }

    // Large single eye
    const eyeOpen = this.eyeBlink > 0 ? Math.max(0.1,1-this.eyeBlink/4) : 1;
    ctx.beginPath();
    ctx.ellipse(0,-s*0.15,s*0.22,s*0.22*eyeOpen,0,0,Math.PI*2);
    ctx.fillStyle='#000';
    ctx.fill();
    const eyeGrad = ctx.createRadialGradient(0,-s*0.15,0,0,-s*0.15,s*0.18);
    eyeGrad.addColorStop(0,this.type.eyeColor);
    eyeGrad.addColorStop(0.6,'#003300');
    eyeGrad.addColorStop(1,'#000');
    ctx.fillStyle=eyeGrad;
    ctx.beginPath();
    ctx.ellipse(0,-s*0.15,s*0.18,s*0.18*eyeOpen,0,0,Math.PI*2);
    ctx.fill();
    // Pupil slit
    ctx.beginPath();
    ctx.ellipse(0,-s*0.15,s*0.04,s*0.14*eyeOpen,0,0,Math.PI*2);
    ctx.fillStyle='#000';
    ctx.fill();
    // Shine
    ctx.beginPath();
    ctx.arc(-s*0.07,-s*0.22,s*0.04,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fill();

    // Mouth — wide grin
    ctx.beginPath();
    ctx.arc(0,s*0.1,s*0.28,0.2,Math.PI-0.2);
    ctx.strokeStyle='#00aa44';
    ctx.lineWidth=s*0.04;
    ctx.stroke();
    // Many small teeth
    for(let t=-3;t<=3;t++){
      ctx.beginPath();
      ctx.moveTo(t*s*0.07+s*0.035, s*0.28);
      ctx.lineTo(t*s*0.07, s*0.38);
      ctx.lineTo(t*s*0.07-s*0.035, s*0.28);
      ctx.fillStyle='rgba(200,255,220,0.8)';
      ctx.fill();
    }

    // Dripping slime
    for(let d=0;d<3;d++){
      const dx = (d-1)*s*0.2;
      const drip = Math.sin(this.limbPhase*0.5+d)*s*0.1+s*0.2;
      ctx.beginPath();
      ctx.moveTo(dx-s*0.04,s*0.5);
      ctx.quadraticCurveTo(dx,s*0.5+drip,dx,s*0.5+drip+s*0.05);
      ctx.quadraticCurveTo(dx,s*0.5+drip+s*0.1,dx+s*0.04,s*0.5);
      ctx.fillStyle='rgba(0,255,100,0.4)';
      ctx.fill();
    }

    ctx.restore();
  }
}

// ---- PARTICLES ----
class Particle {
  constructor(x, y, color){
    this.x=x; this.y=y;
    const a=Math.random()*Math.PI*2;
    const sp=1+Math.random()*4;
    this.vx=Math.cos(a)*sp; this.vy=Math.sin(a)*sp;
    this.life=1; this.decay=0.01+Math.random()*0.02;
    this.size=1+Math.random()*3;
    this.color=color;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=0.05; this.life-=this.decay; }
  draw(){
    ctx.globalAlpha=this.life;
    ctx.fillStyle=this.color;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  }
}

// ---- HAND UTILS ----
function palmCenter(lm){
  const pts=[0,5,9,13,17];
  let x=0,y=0;
  pts.forEach(i=>{x+=lm[i].x;y+=lm[i].y;});
  return {x:x/pts.length,y:y/pts.length};
}

function palmRadius(lm){
  const c=palmCenter(lm);
  return Math.hypot(lm[5].x-c.x, lm[5].y-c.y)*2.5;
}

function handClosed(lm){
  // Check if fingers are curled
  const tips=[8,12,16,20];
  const pips=[6,10,14,18];
  let closed=0;
  tips.forEach((t,i)=>{
    if(lm[t].y > lm[pips[i]].y) closed++;
  });
  return closed >= 3;
}

// ---- MAIN ----
async function init(){
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22-rc.20250304/wasm"
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision,{
    baseOptions:{
      modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate:"GPU"
    },
    runningMode:"VIDEO",
    numHands:2
  });

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}
  });
  video.srcObject=stream;
  await new Promise(r=>video.onloadedmetadata=r);
  loading.style.display='none';
  render();
}

let portalOpenAmount = 0;
let lastHandDist = 0;

function render(){
  requestAnimationFrame(render);
  frame++;
  ctx.clearRect(0,0,W,H);

  let h0=null,h1=null;
  let bothClosed=false;
  let portalCx=W/2, portalCy=H/2, portalR=120;

  if(handLandmarker && video.readyState>=2){
    const result = handLandmarker.detectForVideo(video, performance.now());
    const lms = result.landmarks || [];

    if(lms.length>=2){
      const c0 = palmCenter(lms[0]);
      const c1 = palmCenter(lms[1]);
      const closed0 = handClosed(lms[0]);
      const closed1 = handClosed(lms[1]);
      bothClosed = closed0 && closed1;

      // Palm centers in screen space (mirrored)
      const sx0 = (1-c0.x)*W, sy0 = c0.y*H;
      const sx1 = (1-c1.x)*W, sy1 = c1.y*H;

      const dist = Math.hypot(sx1-sx0, sy1-sy0);
      const midX = (sx0+sx1)*0.5;
      const midY = (sy0+sy1)*0.5;

      if(!bothClosed){
        portalOpenAmount = Math.min(1, portalOpenAmount + 0.04);
        const targetR = Math.min(dist*0.5, Math.min(W,H)*0.4);
        portalCx=midX; portalCy=midY; portalR=targetR;

        if(!portal){
          portal = new Portal(midX, midY, targetR);
        } else {
          portal.update(midX, midY, targetR*portalOpenAmount);
        }

        // Spawn aliens when portal is well open
        if(portalOpenAmount>0.6 && Math.random()<0.008 && aliens.length<5){
          aliens.push(new Alien(portal.cx, portal.cy, portal.r));
        }

        // Energy particles along rim
        if(Math.random()<0.3){
          const a=Math.random()*Math.PI*2;
          const px=portal.cx+Math.cos(a)*portal.r*portal.open;
          const py=portal.cy+Math.sin(a)*portal.r*0.55*portal.open;
          particles.push(new Particle(px,py,'rgba(160,80,255,0.8)'));
        }

        // Draw hand markers
        [lms[0],lms[1]].forEach(lm=>{
          const pc=palmCenter(lm);
          const sx=(1-pc.x)*W, sy=pc.y*H;
          // Energy glow on hands
          const hGlow=ctx.createRadialGradient(sx,sy,0,sx,sy,60);
          hGlow.addColorStop(0,'rgba(140,60,255,0.3)');
          hGlow.addColorStop(1,'transparent');
          ctx.fillStyle=hGlow;
          ctx.beginPath();
          ctx.arc(sx,sy,60,0,Math.PI*2);
          ctx.fill();
          // Draw skeleton
          drawHandSkeleton(ctx,lm,W,H);
        });

        // Connection beam between hands
        drawEnergyBeam(ctx,sx0,sy0,sx1,sy1,portalOpenAmount);

      } else {
        // Both closed — close portal
        portalOpenAmount = Math.max(0, portalOpenAmount-0.06);
        if(portal){
          portal.closing=true;
          portal.update(midX,midY,portalR);
          if(portal.open<=0) portal=null;
        }
      }

      hint.style.opacity='0';
    } else if(lms.length===1){
      hint.style.opacity='0.5';
      hint.textContent='SHOW BOTH HANDS';
      portalOpenAmount=Math.max(0,portalOpenAmount-0.03);
      if(portal){portal.closing=true;portal.update(portal.cx,portal.cy,portal.r);if(portal.open<=0)portal=null;}
    } else {
      hint.style.opacity='1';
      hint.textContent='BRING BOTH PALMS CLOSE → PULL APART TO OPEN PORTAL';
      portalOpenAmount=Math.max(0,portalOpenAmount-0.03);
      if(portal){portal.closing=true;portal.update(portal.cx,portal.cy,portal.r);if(portal.open<=0)portal=null;}
    }
  }

  // Draw portal
  if(portal) portal.draw();

  // Draw aliens
  aliens.forEach(a=>{ a.update(); a.draw(); });
  aliens=aliens.filter(a=>a.alive);

  // Draw particles
  particles.forEach(p=>{ p.update(); p.draw(); });
  particles=particles.filter(p=>p.life>0);
}

function drawEnergyBeam(ctx, x1,y1,x2,y2, strength){
  if(strength<0.1) return;
  // Main beam
  ctx.save();
  ctx.globalAlpha=strength*0.4;
  const grad=ctx.createLinearGradient(x1,y1,x2,y2);
  grad.addColorStop(0,'rgba(160,80,255,0.8)');
  grad.addColorStop(0.5,'rgba(200,120,255,1)');
  grad.addColorStop(1,'rgba(160,80,255,0.8)');
  ctx.strokeStyle=grad;
  ctx.lineWidth=3;
  // Wavy line
  ctx.beginPath();
  const steps=20;
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const wave=Math.sin(t*Math.PI*4+frame*0.1)*(1-strength)*8;
    const nx=x1+(x2-x1)*t + (y2-y1)/Math.hypot(x2-x1,y2-y1)*wave;
    const ny=y1+(y2-y1)*t - (x2-x1)/Math.hypot(x2-x1,y2-y1)*wave;
    i===0?ctx.moveTo(nx,ny):ctx.lineTo(nx,ny);
  }
  ctx.stroke();
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawHandSkeleton(ctx,lm,W,H){
  const connections=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
  ctx.strokeStyle='rgba(160,80,255,0.25)';
  ctx.lineWidth=1;
  connections.forEach(([a,b])=>{
    const la=lm[a],lb=lm[b];
    ctx.beginPath();
    ctx.moveTo((1-la.x)*W,la.y*H);
    ctx.lineTo((1-lb.x)*W,lb.y*H);
    ctx.stroke();
  });
  lm.forEach(pt=>{
    ctx.beginPath();
    ctx.arc((1-pt.x)*W,pt.y*H,2,0,Math.PI*2);
    ctx.fillStyle='rgba(200,150,255,0.4)';
    ctx.fill();
  });
}

init().catch(err=>{
  loading.innerHTML=`<div style="color:#ff4444">ERROR</div><p>${err.message}</p><p style="margin-top:8px;font-size:10px">Allow camera and reload</p>`;
});
</script>
